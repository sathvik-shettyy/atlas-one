name: Feature Request
description: Propose an enhancement for Atlas One
title: "[Feature] "
labels: ["enhancement"]
body:
	- type: textarea
		id: problem
		attributes:
			label: Problem Statement
			description: What limitation are you trying to solve?
		validations:
			required: true
	- type: textarea
		id: proposal
		attributes:
			label: Proposal
			description: Describe your suggested solution
		validations:
			required: true
	- type: textarea
		id: security
		attributes:
			label: Security Impact
			description: Any impact on identity, MFA, RBAC, or gateway behavior?

