events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	sendfile on;
	server_tokens off;

	upstream atlas_dashboard {
		server dashboard:3000;
	}

	upstream atlas_policy {
		server policy-engine:8081;
	}

	upstream atlas_workspace {
		server dashy:4000;
	}

	server {
		listen 8080;
		server_name localhost;

		add_header X-Frame-Options "SAMEORIGIN" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header Referrer-Policy "strict-origin-when-cross-origin" always;

		location = /healthz {
			access_log off;
			return 200 "ok";
		}

		location /api/ {
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_pass http://atlas_policy/;
		}

		location = /_atlas_auth {
			internal;
			proxy_pass http://atlas_policy/gateway/authorize;
			proxy_set_header Content-Length "";
			proxy_set_header X-Original-URI $request_uri;
			proxy_set_header X-Original-Method $request_method;
			proxy_set_header Cookie $http_cookie;
		}

		location /workspace {
			auth_request /_atlas_auth;
			error_page 401 = @atlas_login_redirect;
			error_page 403 = @atlas_forbidden;

			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_pass http://atlas_workspace;
		}

		location / {
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_pass http://atlas_dashboard;
		}

		location @atlas_login_redirect {
			return 302 /login;
		}

		location @atlas_forbidden {
			default_type application/json;
			return 403 '{"detail":"Access denied by Atlas One Policy Engine"}';
		}
	}
}

